<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👥 Staff – CloudBot Network</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  :root{--bg:#07080c;--surface:rgba(255,255,255,.04);--surface2:rgba(255,255,255,.07);--border:rgba(255,255,255,.08);--text:#e2e5f0;--muted:#72767d}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;background-image:radial-gradient(ellipse at 15% 15%,rgba(88,101,242,.13),transparent 45%),radial-gradient(ellipse at 85% 85%,rgba(139,92,246,.1),transparent 45%)}
  header{text-align:center;padding:64px 24px 40px}
  .header-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(88,101,242,.15);border:1px solid rgba(88,101,242,.3);padding:6px 16px;border-radius:20px;font-size:12px;font-weight:600;color:#7c8ff5;letter-spacing:.5px;margin-bottom:20px}
  header h1{font-size:clamp(32px,5vw,52px);font-weight:900;background:linear-gradient(135deg,#fff 0%,#a5b4fc 50%,#c084fc 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px;letter-spacing:-1px}
  .header-sub{color:var(--muted);font-size:15px;display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap}
  .stat-pill{display:inline-flex;align-items:center;gap:6px;background:var(--surface2);border:1px solid var(--border);padding:4px 14px;border-radius:20px;font-size:13px;font-weight:500}
  .divider{width:80px;height:2px;background:linear-gradient(90deg,transparent,rgba(88,101,242,.6),transparent);margin:32px auto}
  .container{max-width:1280px;margin:0 auto;padding:0 24px 80px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:28px}
  .server-card{background:var(--surface);border:1px solid var(--border);border-radius:24px;overflow:hidden;backdrop-filter:blur(20px);transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .3s;opacity:0;transform:translateY(24px)}
  .server-card.visible{opacity:1;transform:translateY(0)}
  .server-card:hover{transform:translateY(-6px);box-shadow:0 24px 64px rgba(0,0,0,.5),0 0 0 1px var(--accent,#5865f2)}
  .server-header{padding:22px;display:flex;align-items:center;gap:14px;background:var(--accentbg,rgba(88,101,242,.1));border-bottom:1px solid var(--border);position:relative;overflow:hidden}
  .server-header::before{content:"";position:absolute;top:-30px;right:-30px;width:100px;height:100px;border-radius:50%;background:var(--accent,#5865f2);opacity:.07;filter:blur(20px)}
  .sv-icon{width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid var(--accent,#5865f2)}
  .sv-emoji{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;background:var(--surface2);border:2px solid var(--accent,#5865f2)}
  .sv-info{flex:1}.sv-name{font-size:17px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}.sv-meta{font-size:12px;color:var(--muted)}
  .sv-accent-dot{width:12px;height:12px;border-radius:50%;box-shadow:0 0 12px currentColor}
  .mc-badge{font-size:11px;font-weight:700;background:var(--surface2);border:1px solid var(--border);padding:3px 8px;border-radius:12px;color:var(--text);white-space:nowrap}
  .server-body{padding:16px;display:flex;flex-direction:column;gap:10px}
  .role-card{border-radius:14px;border:1px solid var(--rc,#5865f2);background:var(--rcbg,rgba(88,101,242,.08));overflow:hidden;transition:box-shadow .2s}
  .role-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.3),0 0 0 1px var(--rc,#5865f2)}
  .role-card-top{padding:10px 14px;display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.06)}
  .rc-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;box-shadow:0 0 8px currentColor}
  .rc-name{flex:1;font-size:13px;font-weight:600}
  .rc-badge{font-size:11px;background:rgba(255,255,255,.08);padding:2px 10px;border-radius:10px;color:var(--muted);font-weight:500}
  .role-members{padding:10px 12px 12px;display:flex;flex-wrap:wrap;gap:7px}
  .member-pill{display:flex;align-items:center;gap:6px;padding:4px 12px 4px 4px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.07);border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
  .member-pill:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.2);transform:scale(1.05)}
  .mp-avatar{position:relative;width:24px;height:24px}
  .mp-img,.mp-fb{width:24px;height:24px;border-radius:50%;object-fit:cover}
  .mp-fb{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:white}
  .no-members,.no-roles{color:var(--muted);font-size:12px;padding:10px;text-align:center;width:100%;font-style:italic}
  #overlay-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
  #overlay-backdrop.open{display:flex}
  .overlay-panel{background:#13151c;border:1px solid rgba(255,255,255,.1);border-radius:24px;width:100%;max-width:520px;box-shadow:0 40px 100px rgba(0,0,0,.6);animation:panelIn .3s cubic-bezier(.34,1.56,.64,1);overflow:hidden;max-height:90vh;display:flex;flex-direction:column}
  @keyframes panelIn{from{opacity:0;transform:scale(.9) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
  .overlay-close{position:absolute;top:16px;right:16px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.08);border:none;color:rgba(255,255,255,.6);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:10}
  .overlay-close:hover{background:rgba(237,66,69,.2);color:#ed4245}
  #server-overlay{display:none;position:relative;flex-direction:column}
  .srv-ov-banner{height:120px;position:relative;display:flex;align-items:flex-end;padding:0 24px 20px;gap:16px}
  .srv-ov-icon{width:72px;height:72px;border-radius:50%;object-fit:cover;border:4px solid #13151c;flex-shrink:0}
  .srv-ov-icon-fb{width:72px;height:72px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:34px;border:4px solid #13151c;background:rgba(255,255,255,.05)}
  .srv-ov-title{flex:1}.srv-ov-name{font-size:22px;font-weight:800}.srv-ov-sub{font-size:13px;color:rgba(255,255,255,.6);margin-top:2px}
  .srv-ov-body{padding:20px 24px 24px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:16px}
  .srv-ov-stats{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px}
  .srv-stat{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:12px;text-align:center}
  .srv-stat .val{font-size:22px;font-weight:800}.srv-stat .lbl{font-size:11px;color:rgba(255,255,255,.5);margin-top:3px}
  .btn-join{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:12px;background:linear-gradient(135deg,#5865f2 0%,#7c4dff 100%);color:white;font-size:15px;font-weight:700;text-decoration:none;transition:all .2s;box-shadow:0 4px 20px rgba(88,101,242,.4)}
  .btn-join:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(88,101,242,.6)}
  #member-overlay{display:none;position:relative;flex-direction:column}
  .mbr-ov-banner{height:100px;position:relative;display:flex;align-items:flex-end;padding:0 24px 16px;gap:16px}
  .mbr-ov-avatar{width:80px;height:80px;border-radius:50%;object-fit:cover;border:4px solid #13151c}
  .mbr-ov-avatar-fb{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:800;color:white;border:4px solid #13151c}
  .mbr-ov-name{font-size:22px;font-weight:800}.mbr-ov-tag{font-size:12px;color:rgba(255,255,255,.5);margin-top:2px}
  .mbr-ov-body{padding:16px 24px 24px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:14px}
  .network-row{display:flex;flex-direction:column;gap:8px}
  .network-row h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:rgba(255,255,255,.4)}
  .srv-row{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:12px 14px;display:flex;flex-direction:column;gap:8px}
  .srv-row-header{display:flex;align-items:center;gap:8px;font-weight:600;font-size:14px}
  .srv-row-dot{width:8px;height:8px;border-radius:50%}
  .srv-row-roles{display:flex;flex-wrap:wrap;gap:6px}
  .role-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;border:1px solid}
  .btn-discord-profile{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:12px;background:rgba(88,101,242,.15);border:1px solid rgba(88,101,242,.3);color:#7c8ff5;font-size:13px;font-weight:600;text-decoration:none;transition:all .2s}
  .btn-discord-profile:hover{background:rgba(88,101,242,.25);border-color:rgba(88,101,242,.5)}
  footer{text-align:center;color:var(--muted);font-size:12px;padding:32px 24px;border-top:1px solid var(--border)}
  #loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;color:var(--muted)}
  .spinner{width:40px;height:40px;border:3px solid rgba(88,101,242,.2);border-top-color:#5865f2;border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  #error-box{display:none;text-align:center;padding:60px 24px;color:#ed4245}
  @media(max-width:640px){header{padding:40px 16px 24px}.grid{grid-template-columns:1fr}.container{padding:0 12px 60px}}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div>Chargement du staff…</div>
</div>

<div id="error-box">
  <div style="font-size:48px;margin-bottom:16px">⚠️</div>
  <div style="font-size:18px;font-weight:700">Impossible de charger les données staff</div>
  <div style="margin-top:8px;font-size:13px;color:var(--muted)" id="error-msg"></div>
</div>

<div id="app" style="display:none">
  <header>
    <div class="header-badge">🌐 CloudBot Network</div>
    <h1>👥 Staff du Réseau</h1>
    <div class="header-sub" id="header-stats"></div>
  </header>
  <div class="divider"></div>
  <div class="container"><div class="grid" id="grid"></div></div>
  <footer>CloudBot Network &bull; Staff Viewer &bull; Cliquez sur un serveur ou membre pour plus d'infos</footer>
</div>

<div id="overlay-backdrop" onclick="closeOverlay(event)">
  <div class="overlay-panel" id="server-overlay">
    <button class="overlay-close" onclick="closeOverlay()">✕</button>
    <div class="srv-ov-banner" id="srv-ov-banner"></div>
    <div class="srv-ov-body" id="srv-ov-body"></div>
  </div>
  <div class="overlay-panel" id="member-overlay">
    <button class="overlay-close" onclick="closeOverlay()">✕</button>
    <div class="mbr-ov-banner" id="mbr-ov-banner"></div>
    <div class="mbr-ov-body" id="mbr-ov-body"></div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────
// Le fichier staff-data.json est dans le même repo que cette page
const DATA_URL = './staff-data.json';
const REFRESH_INTERVAL = 60 * 1000; // rafraîchissement auto toutes les 60s

const SERVER_ACCENTS = ['#5865f2','#eb459e','#57f287','#faa61a','#3ba55d','#fee75c','#9b59b6','#1abc9c'];
let STAFF_DATA = null;
let MEMBERS_MAP = {};

// ─── UTILS ────────────────────────────────────────────────────────
function escHtml(str){return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function strColor(str){let h=0;for(const c of str)h=c.charCodeAt(0)+((h<<5)-h);const cols=['#5865f2','#57f287','#fee75c','#eb459e','#ed4245','#faa61a','#3ba55d','#9b59b6'];return cols[Math.abs(h)%cols.length];}
function hexToRgba(hex,a){if(!hex||hex.length<7)return`rgba(88,101,242,${a})`;const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${a})`;}
function normalizeInvite(code){if(!code)return null;if(code.startsWith('https://')||code.startsWith('http://'))return code;if(code.indexOf('discord.gg/')!==-1)return'https://'+code.replace(/^\/\//,'');return'https://discord.com/invite/'+code;}
function fmt(n){return n!=null?Number(n).toLocaleString('fr-FR'):'—';}

// ─── LOAD ─────────────────────────────────────────────────────────
async function load(silent=false) {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    STAFF_DATA = await res.json();
    buildMembersMap();
    render();
    if (!silent) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('app').style.display = '';
    }
  } catch(e) {
    if (!silent) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error-box').style.display = '';
      document.getElementById('error-msg').textContent = e.message;
    }
    console.error('[Staff] Erreur chargement:', e);
  }
}

function buildMembersMap() {
  MEMBERS_MAP = {};
  (STAFF_DATA.servers || []).forEach((srv, idx) => {
    const accent = SERVER_ACCENTS[idx % SERVER_ACCENTS.length];
    (srv.roles || []).forEach(role => {
      (role.members || []).forEach(m => {
        if (!MEMBERS_MAP[m.id]) MEMBERS_MAP[m.id] = { ...m, roles: [] };
        MEMBERS_MAP[m.id].roles.push({ serverId: srv.id, serverName: srv.name, serverEmoji: srv.emoji, serverAccent: accent, roleId: role.id, roleName: role.name, roleColor: role.color });
      });
    });
  });
}

// ─── RENDER ───────────────────────────────────────────────────────
function render() {
  const data = STAFF_DATA;
  const totalRoles = data.servers.reduce((a,s)=>a+(s.roles||[]).length,0);
  const totalMembers = data.servers.reduce((a,s)=>a+(s.roles||[]).reduce((b,r)=>b+(r.members||[]).length,0),0);
  const lastUpdate = data.lastUpdated ? new Date(data.lastUpdated).toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'}) : 'N/A';

  document.getElementById('header-stats').innerHTML =
    `<span class="stat-pill">🏠 ${data.servers.length} serveurs</span>` +
    `<span class="stat-pill">🎭 ${totalRoles} rôles staff</span>` +
    `<span class="stat-pill">👤 ${totalMembers} staffs</span>` +
    `<span class="stat-pill">📅 ${escHtml(lastUpdate)}</span>`;

  const grid = document.getElementById('grid');
  grid.innerHTML = data.servers.map((srv, idx) => {
    const accent = SERVER_ACCENTS[idx % SERVER_ACCENTS.length];
    const roles = srv.roles || [];
    const totalM = roles.reduce((a,r)=>a+(r.members||[]).length,0);

    const roleCards = roles.map(role => {
      const mc = (role.members||[]).length;
      const membersHtml = (role.members||[]).map(m => {
        const col = strColor(m.username||'');
        const initials = m.username ? m.username[0].toUpperCase() : '?';
        const avHtml = m.avatar
          ? `<img class="mp-img" src="${escHtml(m.avatar)}" onerror="this.style.display='none';this.nextSibling.style.display='flex'" alt=""><div class="mp-fb" style="background:${col};display:none">${initials}</div>`
          : `<div class="mp-fb" style="background:${col}">${initials}</div>`;
        return `<div class="member-pill" onclick="openMemberOverlay('${escHtml(m.id)}')"><div class="mp-avatar">${avHtml}</div><span>${escHtml(m.username)}</span></div>`;
      }).join('');

      return `<div class="role-card" style="--rc:${role.color};--rcbg:${hexToRgba(role.color,0.08)}">
        <div class="role-card-top">
          <div class="rc-dot" style="background:${role.color}"></div>
          <span class="rc-name">${escHtml(role.name)}</span>
          <div class="rc-badge">${mc} ${mc>1?'membres':'membre'}</div>
        </div>
        <div class="role-members">${membersHtml||'<div class="no-members">Aucun membre assigné</div>'}</div>
      </div>`;
    }).join('');

    const iconHtml = srv.icon
      ? `<img class="sv-icon" src="${escHtml(srv.icon)}" onerror="this.style.display='none';this.nextSibling.style.display='flex'" alt=""><div class="sv-emoji" style="display:none">${escHtml(srv.emoji)}</div>`
      : `<div class="sv-emoji">${escHtml(srv.emoji)}</div>`;

    return `<div class="server-card" style="--accent:${accent};--accentbg:${hexToRgba(accent,0.1)}" data-appear>
      <div class="server-header" onclick="openServerOverlay('${escHtml(srv.id)}')" style="cursor:pointer">
        <div>${iconHtml}</div>
        <div class="sv-info">
          <div class="sv-name">${escHtml(srv.emoji)} ${escHtml(srv.name)} <span class="mc-badge">${fmt(srv.memberCount)} membres</span></div>
          <div class="sv-meta">${roles.length} rôle${roles.length>1?'s':''} staff · ${totalM} staff${totalM>1?'s':''}</div>
        </div>
        <div class="sv-accent-dot" style="background:${accent}"></div>
      </div>
      <div class="server-body">${roles.length>0?roleCards:'<div class="no-roles">Aucun rôle staff configuré</div>'}</div>
    </div>`;
  }).join('');

  // Apparition animée
  requestAnimationFrame(() => {
    const obs = new IntersectionObserver((entries) => {
      entries.forEach((e, i) => {
        if (e.isIntersecting) { setTimeout(() => e.target.classList.add('visible'), i * 80); obs.unobserve(e.target); }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('[data-appear]').forEach(c => obs.observe(c));
  });
}

// ─── OVERLAYS ─────────────────────────────────────────────────────
function openOverlay(panelId) {
  document.getElementById('server-overlay').style.display = 'none';
  document.getElementById('member-overlay').style.display = 'none';
  document.getElementById(panelId).style.display = 'flex';
  document.getElementById('overlay-backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeOverlay(e) {
  if (e && e.target !== document.getElementById('overlay-backdrop')) return;
  document.getElementById('overlay-backdrop').classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeOverlay(); });

function openServerOverlay(serverId) {
  const srv = STAFF_DATA.servers.find(s => s.id === serverId);
  if (!srv) return;
  const idx = STAFF_DATA.servers.indexOf(srv);
  const accent = SERVER_ACCENTS[idx % SERVER_ACCENTS.length];
  const totalRoles = (srv.roles||[]).length;
  const totalMembers = (srv.roles||[]).reduce((a,r)=>a+(r.members||[]).length,0);
  const banner = document.getElementById('srv-ov-banner');
  banner.style.background = `linear-gradient(135deg,${accent}33 0%,#13151c 100%)`;
  const iconHtml = srv.icon ? `<img class="srv-ov-icon" src="${srv.icon}" onerror="this.style.display='none'" alt="">` : `<div class="srv-ov-icon-fb">${srv.emoji}</div>`;
  banner.innerHTML = iconHtml + `<div class="srv-ov-title"><div class="srv-ov-name">${escHtml(srv.name)}</div><div class="srv-ov-sub">Serveur Discord</div></div>`;
  const inviteUrl = normalizeInvite(srv.inviteCode);
  const inviteDisplay = srv.inviteCode ? (srv.inviteCode.indexOf('/')!==-1?srv.inviteCode.replace(/^https?:\/\//,''):'discord.gg/'+srv.inviteCode) : null;
  const inviteHtml = inviteUrl ? `<a class="btn-join" href="${inviteUrl}" target="_blank" rel="noopener">🔗 Rejoindre ${escHtml(srv.name)}</a>` + (inviteDisplay?`<div style="text-align:center;font-size:11px;color:rgba(255,255,255,.3)">${inviteDisplay}</div>`:'') : `<div style="text-align:center;color:rgba(255,255,255,.4);font-size:13px">Lien d'invitation non configuré</div>`;
  document.getElementById('srv-ov-body').innerHTML =
    `<div class="srv-ov-stats">
      <div class="srv-stat"><div class="val" style="color:${accent}">${fmt(srv.memberCount)}</div><div class="lbl">Membres</div></div>
      <div class="srv-stat"><div class="val" style="color:#57f287">${fmt(srv.onlineCount)}</div><div class="lbl">En ligne</div></div>
      <div class="srv-stat"><div class="val" style="color:${accent}">${totalRoles}</div><div class="lbl">Rôles staff</div></div>
      <div class="srv-stat"><div class="val" style="color:${accent}">${totalMembers}</div><div class="lbl">Staff total</div></div>
    </div>` + inviteHtml;
  openOverlay('server-overlay');
}

function openMemberOverlay(memberId) {
  const m = MEMBERS_MAP[memberId];
  if (!m) return;
  const col = strColor(m.username||'');
  const banner = document.getElementById('mbr-ov-banner');
  banner.style.background = `linear-gradient(135deg,${col}33 0%,#13151c 100%)`;
  const initials = m.username ? m.username[0].toUpperCase() : '?';
  const avatarHtml = m.avatar ? `<img class="mbr-ov-avatar" src="${m.avatar}" onerror="this.style.display='none'" alt="">` : `<div class="mbr-ov-avatar-fb" style="background:${col}">${initials}</div>`;
  banner.innerHTML = avatarHtml + `<div><div class="mbr-ov-name">${escHtml(m.username)}</div><div class="mbr-ov-tag">@${escHtml((m.realUsername||m.username).replace(/ /g,'').toLowerCase())}</div></div>`;
  const byServer = {};
  (m.roles||[]).forEach(r => {
    if (!byServer[r.serverId]) byServer[r.serverId] = { name: r.serverName, emoji: r.serverEmoji, accent: r.serverAccent, roles: [] };
    byServer[r.serverId].roles.push(r);
  });
  const serverRows = Object.values(byServer).map(s =>
    `<div class="srv-row"><div class="srv-row-header"><div class="srv-row-dot" style="background:${s.accent}"></div><span>${escHtml(s.emoji)} ${escHtml(s.name)}</span></div>
    <div class="srv-row-roles">${s.roles.map(r=>`<span class="role-chip" style="color:${r.roleColor};border-color:${r.roleColor}33;background:${r.roleColor}11"><span style="width:7px;height:7px;border-radius:50%;background:${r.roleColor};display:inline-block"></span> ${escHtml(r.roleName)}</span>`).join('')}</div></div>`
  ).join('');
  const nbServers = Object.keys(byServer).length, nbRoles = (m.roles||[]).length;
  document.getElementById('mbr-ov-body').innerHTML =
    `<div class="network-row"><h3>📊 Résumé réseau</h3><div style="display:flex;gap:10px">
      <div class="srv-stat" style="flex:1"><div class="val" style="color:${col}">${nbServers}</div><div class="lbl">Serveur${nbServers>1?'s':''}</div></div>
      <div class="srv-stat" style="flex:1"><div class="val" style="color:${col}">${nbRoles}</div><div class="lbl">Rôle${nbRoles>1?'s':''} staff</div></div>
    </div></div>
    <div class="network-row"><h3>🎭 Rôles dans le réseau</h3>${serverRows}</div>
    <a class="btn-discord-profile" href="https://discord.com/users/${m.id}" target="_blank" rel="noopener"><img src="https://assets-global.website-files.com/6257adef93867e50d84d30e2/636e0a6a49cf127bf92de1e2_icon_clyde_blurple_RGB.png" width="16" alt=""> Voir le profil Discord</a>`;
  openOverlay('member-overlay');
}

// ─── START ────────────────────────────────────────────────────────
load();
setInterval(() => load(true), REFRESH_INTERVAL);
</script>
</body>
</html>
